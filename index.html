<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NullChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#app{
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#1c1c1c;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:5px 0;
padding:8px;
border-radius:6px;
max-width:70%;
}

.me{
background:#3a6df0;
align-self:flex-end;
}

.other{
background:#333;
}

#input{
display:flex;
padding:10px;
background:#1c1c1c;
}

#input input{
flex:1;
padding:8px;
}

#input button{
padding:8px;
}

.bg1{background:#0f172a}
.bg2{background:#1e293b}
.bg3{background:#312e81}
.bg4{background:#1e3a8a}
.bg5{background:#134e4a}
.bg6{background:#4c0519}
.bg7{background:#1f2937}
.bg8{background:#0c4a6e}
.bg9{background:#3f6212}
.bg10{background:#4a044e}

</style>
</head>

<body>

<div id="app">

<header>
<div>NullChat</div>
<div>
<button onclick="generateRoomQR()">QR</button>
<button onclick="showOfflineTutorial()">Offline Help</button>
</div>
</header>

<div id="chat"></div>

<div id="input">
<input id="msgBox" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
<button onclick="shareFileOffline()">File</button>
</div>
</div>
<script>

let ably=null
let channel=null

let room="main-room"

let myId=Math.random().toString(36).substring(2)

let admin=null

function init(){

ably=new Ably.Realtime("YOUR_ABLY_KEY")

channel=ably.channels.get(room)

channel.subscribe("msg",receiveMsg)

channel.subscribe("alert",handleAlert)

channel.subscribe("kick",kickHandler)

}

function sendMsg(){

let box=document.getElementById("msgBox")

let text=box.value

if(!text)return

channel.publish("msg",{
from:myId,
text:text
})

addMessage(text,true)

box.value=""

}

function receiveMsg(msg){

let data=msg.data

if(data.from===myId)return

addMessage(data.text,false)

}

function addMessage(text,me){

let div=document.createElement("div")

div.className="msg "+(me?"me":"other")

div.innerText=text

document.getElementById("chat").appendChild(div)

}
function generateRoomQR(){

let canvas=document.createElement("canvas")

QRCode.toCanvas(canvas,room)

document.body.appendChild(canvas)

}

async function shareFileOffline(){

let input=document.createElement("input")

input.type="file"

input.onchange=function(){

let file=input.files[0]

let reader=new FileReader()

reader.onload=function(){

channel.publish("msg",{
from:myId,
file:file.name,
data:reader.result
})

}

reader.readAsDataURL(file)

}

input.click()

}

navigator.mediaDevices.addEventListener("devicechange",()=>{

channel.publish("alert",{
from:myId,
type:"capture"
})

})

function handleAlert(msg){

let data=msg.data

if(data.type==="capture"){

let action=confirm("Someone tried to capture the chat. Delete chat?")

if(action){
document.getElementById("chat").innerHTML=""
}

}

}
function kickUser(id){

if(admin!==myId){

alert("Only admin can remove users")

return

}

channel.publish("kick",{target:id})

}

function kickHandler(msg){

if(msg.data.target===myId){

alert("You were removed from the room")

location.reload()

}

}

function detectMode(){

if(!navigator.onLine){

alert("Offline mode enabled")

}

}

window.addEventListener("online",detectMode)

window.addEventListener("offline",detectMode)

function showOfflineTutorial(){

alert(
`Offline Chat Guide

1 Turn on Bluetooth
2 Open app on both devices
3 Join same room
4 Stay in range`
)

}

function setChatBg(bg){

let app=document.getElementById("app")

for(let i=1;i<=10;i++){

app.classList.remove("bg"+i)

}

app.classList.add(bg)

}

init()

</script>

</body>
</html>
